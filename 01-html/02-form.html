<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Exercise 02 - Form</title>
    <style>
      fieldset {
      margin: 0;
      border: 0;
      padding: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <!-- Add your code here -->
       <h1>Roth IRA Calculator</h1>
       <form action="/submitform">
        <div>
          <label for="Balance">Balance ($)</label><br>
          <input type="text" name="Balance" id="Balance">
        </div>
        <br>
        <div>
          <label for="Annual">Annual Contribution ($)</label><br>
          <input type="text" name="Annual" id="Annual">
        </div>
        <br>
        <fieldset>
          <legend>Maximize Contributions?</legend>
          <input type="radio" name="maximize" id="yes" value="yes">
          <label for="yes">Yes</label>
          <input type="radio" name="maximize" id="no" value="no">
          <label for="no">No</label>
        </fieldset>
        <br>
        <div>
          <label for="rate">Expected Rate of Return (%)</label><br>
          <input type="number" name="rate" id="rate">
        </div><br>
        <div>
          <label for="current">Current Age</label><br>
          <input type="number" name="current" id="current">
        </div><br>
        <div>
          <label for="retire">Retirement Age</label><br>
          <input type="number" name="retire" id="retire">
        </div><br>
        <div>
          <label for="margin">Marginal Tax Rate (%)</label><br>
          <input type="number" name="margin" id="margin">
        </div>
        <br>
        <div>
          <input type="submit" value="Calculate">
          <input type="reset" value="Reset">
        </div>
       </form>
       <p>This exerczise is a simplified version of the Roth IRA Calculator at <a href="www.calculator.net">Calculator.net</a> </p>
    </main>
  </body>
</html>
