<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Exercise 02 - Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="bg-light">
    <main class="d-flex align-items-center">
      <form action="/submit" class="ira-form container mt-5 border border-2 bg-white rounded">
      <h1 class="text-center m-4 fs-2">Roth IRA Calculator</h1>
        <div class="mb-3 row">
          <label class="col-sm-6 col-form-label" for="Balance">Balance ($)</label>
        <div class="col-sm-6">
          <input class="form-control" type="text" name="Balance" id="Balance">
        </div>
      </div>

        <div class="mb-3 row">
          <label class="col-sm-6 col-form-label" for="Annual">Annual Contribution ($)</label>
          <div class="col-sm-6">
            <input class="form-control"  type="text" name="Annual" id="Annual">
          </div>
        </div>

        <fieldset class="row md-3">
          <legend class="col-sm-6 col-form-label">Maximize Contributions?</legend>
          <div class="col-sm-6">
            <div class="form-check">
              <input type="radio" class="form-check-input" name="maximize" id="yes" value="yes">
              <label class="form-check-label" for="yes">Yes</label>
            </div>
            <div class="form-check">
              <input type="radio" class="form-check-input" name="maximize" id="no" value="no">
              <label class="form-check-label" for="no">No</label>
            </div>
          </div>
        </fieldset>

        <div class="mb-3 row">
          <label class="col-sm-6 col-form-label" for="rate">Expected Rate of Return (%)</label>
          <div class="col-sm-6">
            <input class="form-control"  type="number" name="rate" id="rate">
          </div>
        </div>

        <div class="mb-3 row">
          <label class="col-sm-6 col-form-label"  for="current">Current Age</label>
          <div class="col-sm-6">
            <input class="form-control"  type="number" name="current" id="current">
          </div>
        </div>

        <div class="mb-3 row">
          <label class="col-sm-6 col-form-label"  for="retire">Retirement Age</label>
          <div class="col-sm-6">
            <input class="form-control"  type="number" name="retire" id="retire">
          </div>
        </div>

        <div class="mb-3 row">
          <label class="col-sm-6 col-form-label"  for="margin">Marginal Tax Rate (%)</label>
          <div class="col-sm-6">
            <input class="form-control"  type="number" name="margin" id="margin">
          </div>
        </div>  
        
        <div class="my-4 row">
          <div class="d-flex gap-2">
            <input  class="btn btn-primary w-100" type="submit" value="Calculate">
            <input  class="btn btn-outline-secondary w-100" type="reset" value="Reset">
          </div>
        </div>
          <p>
            This exerczise is a simplified version of the Roth IRA Calculator at 
            <a class="text-primary" href="www.calculator.net">
            Calculator.net</a>
           </p>
        </form>
      </main>
  </body>
</html>
